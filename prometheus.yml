global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape direct Spring Boot Prometheus Actuator endpoint
  - job_name: 'spring-boot-actuator'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']

  # Scrape OpenTelemetry Collector metrics exporter
  - job_name: 'otel-collector-metrics'
    static_configs:
      - targets: ['otel-collector:8889']
